readError = تعذّر حفظ %S، إذ تعذّر قراءة ملف المصدر.\n\nحاول مجددًا لاحقًا، أو تواصل بمدير الخادوم.
writeError = تعذّر حفظ %S، بسبب وقوع خطأ مجهول.\n\nحاول الحفظ في مكان آخر.
launchError = تعذّر فتح %S، بسبب وقوع خطأ مجهول.\n\nحاول الحفظ في القرص أولا ثم فتح الملف.
diskFull = لا توجد مساحة كافية على القرص لحفظ%S.\n\nأزل الملفات غير الضرورية من القرص وحاول مجددًا، أو حاول الحفظ في مكان آخر.
readOnly = تعذّر حفظ %S، لأنّ القرص، أو المجلّد، أو الملفّ محمي ضدّ الكتابة.\n\nأعد تفعيل الكتابة على القرص وحاول مجددًا، أو حاول الحفظ في مكان آخر.
accessError = تعذّر حفظ %S، لأنّك لا تستطيع تغيير محتويات المجلّد.\n\nغيّر خصائص المجلّد وحاول مجددًا، أو حاول الحفظ في مكان آخر.
SDAccessErrorCardReadOnly = تعذّر تنزيل الملف لأن بطاقة التخزين مستخدمة.
SDAccessErrorCardMissing = تعذّر تنزيل الملف لأن بطاقة التخزين غير موجودة.
helperAppNotFound = تعذّر فتح %S، لأن التطبيق المساعد المرتبط غير موجود. غيّر الارتباط في تفضيلاتك.
noMemory = لا توجد ذاكرة كافية لإكمال الفعل الذي طلبته.\n\nعليك الخروج من بعض التطبيقات والمحاولة مجددًا.
title = ينزل %S
fileAlreadyExistsError = تعذّر حفظ %S، لأنّ ملفًا يحمل نفس اسم مجلد ‪‘_files’‬ موجود مسبقًا.\n\nحاول الحفظ في مكان آخر.
fileNameTooLongError = تعذّر حفظ %S، لأن اسم الملف طويل جدًا.\n\nحاول الحفظ باسم أقصر.
