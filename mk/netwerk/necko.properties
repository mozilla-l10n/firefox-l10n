# Directory listing strings
DirTitle = Содржина на %1$S
DirGoUp = Нагоре во директориум од повисоко ниво
ShowHidden = Покажувај скриени објекти
DirColName = Име
DirColSize = Големина
DirColMTime = Последна промена
