RepostFormData = Оваа страница се пренасочува кон кова локација. Дали сакате да ги препратите податоците од образецот на новата локација?
# Directory listing strings
DirTitle = Содржина на %1$S
DirGoUp = Нагоре во директориум од повисоко ниво
ShowHidden = Покажувај скриени објекти
DirColName = Име
DirColSize = Големина
DirColMTime = Последна промена
DirFileLabel = Датотека:
SuperfluousAuth = Ќе се пријавите на мрежното место „%1$S“ со корисничкото име „%2$S“, но тоа не бара да се идентификувате. Ова можеби е обид да бидете измамени. \n\nДали „%1$S“ е местото што сакате да го посетите?
AutomaticAuth = Ќе се пријавите на мрежното место „%1$S“ со корисничкото име „%2$S“.
TrackerUriBlockedByETP = Ресурсот на “%1$S” беше блокиран бидејќи засилената заштита од следење е овозможена.
TrackerUriBlocked = Ресурсот на “%1$S” беше блокиран бидејќи блокирањето на содржина е овозможено.
UnsafeUriBlocked = Ресурсот на “%1$S” беше блокиран од безбедното прелистување.
# LOCALIZATION NOTE (StrictUrlProtocolSetter): %1$S is the URL that has attempted to be changed. %2$S is the invalid target protocol.
StrictUrlProtocolSetter = Промената на URL-то “%1$S“ во протокол “%2$S“ беше блокирана.
# LOCALIZATION NOTE (CORPBlocked): %1$S is the URL of the blocked resource. %2$S is the URL of the MDN page about CORP.
CORPBlocked = Ресурсот на “%1$S” беше блокиран поради (недостаток на) неговото загавие за Cross-Origin-Resource-Policy. Повеќе %2$S
CookieBlockedByPermission = Барањето за пристап до колачиња или складиште на “%1$S” беше блокирано поради поставените дозволи за колачиња.
CookieBlockedTrackerByETP = Барањето за пристап до колачиња или складиште на “%1$S” беше блокирано бидејќи дојде од следач и Подобрената заштита од следење е овозможена.
CookieBlockedTracker = Барањето за пристап до колачиња или складиште на “%1$S” беше блокирано бидејќи дојде од следач и блокирањето на содржина е овозможено.
CookieBlockedAll = Барањето за пристап до колачиња или складиште на “%1$S” беше блокирано бидејќи ги блокираме сите барања за пристап.
CookieBlockedForeignByETP = Барањето за пристап до колачиња или складиште на “%1$S” беше блокирано бидејќи ги блокираме сите барања за пристап од трети страни и Подобрената заштита од следење е овозможена.
CookieBlockedForeign = Барањето за пристап до колачиња или складиште на “%1$S” беше блокирано бидејќи ги блокираме сите барања за пристап од трети страни и блокирањето на содржина е овозможено.
# As part of dynamic state partitioning, third-party resources might be limited to "partitioned" storage access that is separate from the first-party context.
# This allows e.g. cookies to still be set, and prevents tracking without totally blocking storage access. This message is shown in the web console when this happens
# to inform developers that their storage is isolated.
CookiePartitionedForeign2 = Делумен пристап до колачиња или складиште му беше даден на “%1$S” бидејќи е вчитан во контекст на трета страна и динамичко делење е овозможено.
# LOCALIZATION NOTE (CookieAllowedForOriginByStorageAccessAPI): %2$S and %1$S are URLs.
CookieAllowedForOriginByStorageAccessAPI = Доделен е пристап до складирање за извор “%2$S” на “%1$S”.
# LOCALIZATION NOTE (CookieAllowedForOriginByHeuristic): %2$S and %1$S are URLs.
CookieAllowedForOriginByHeuristic = Автоматски е доделен пристап до складирање за извор “%2$S” на “%1$S”.
# LOCALIZATION NOTE (CookieAllowedForFpiByHeuristic): %2$S and %1$S are URLs.
CookieAllowedForFpiByHeuristic = Автоматски е доделен пристап за изолирање на први страни за “%2$S” на “%1$S”.
# LOCALIZATION NOTE (CookieAllowedForDFPIByHeuristic): %2$S and %1$S are URLs.
CookieAllowedForDFPIByHeuristic = Автоматски е доделен пристап до складирање за динамично делење за “%2$S” на “%1$S”.
# LOCALIZATION NOTE(CookieRejectedNonRequiresSecure2): %1$S is the cookie name. Do not localize "SameSite=None" and "secure".
CookieRejectedNonRequiresSecure2 = Колачето “%1$S” е одбиено бидејќи го има атрибутот “SameSite=None”, но му недостасува атрибутот “secure”.
# LOCALIZATION NOTE(CookieRejectedNonRequiresSecureForBeta3): %1$S is the cookie name. %2$S is a URL. Do not localize "SameSite", "SameSite=None" and "secure".
CookieRejectedNonRequiresSecureForBeta3 = Колачето “%1$S” наскоро ќе биде одбиено бидејќи атрибутот “SameSite” му е поставен на “None” без атрибутот “secure”. За да дознаете повеќе за атрибутот “SameSite”, прочитајте го %2$S
# LOCALIZATION NOTE(CookieLaxForced2): %1$S is the cookie name. Do not localize "SameSite", "Lax" and "SameSite=Lax".
CookieLaxForced2 = Колачето “%1$S” има политика “SameSite” поставена на “Lax” бидејќи му недостасува атрибут “SameSite”, а “SameSite=Lax” е стандардната вредност за овој атрибут.
# LOCALIZATION NOTE(CookieLaxForcedForBeta2): %1$S is the cookie name. %2$S is a URL. Do not localize "SameSite", "Lax" and "SameSite=Lax", "SameSite=None".
CookieLaxForcedForBeta2 = Колачето “%1$S“ нема соодветна вредност на атрибутот „SameSite“. Наскоро, колачињата без атрибутот “SameSite“ или со неважечка вредност ќе се третираат како “Lax“. Ова значи дека колачето повеќе нема да се испраќа во контексти на трети страни. Ако вашата апликација зависи од достапноста на ова колаче во такви контексти, додадете го атрибутот “SameSite=None“ на него. За да дознаете повеќе за атрибутот “SameSite“, прочитајте го %2$S
# LOCALIZATION NOTE(CookieSameSiteValueInvalid2): %1$S is cookie name. Do not localize "SameSite", "Lax", "Strict" and "None"
CookieSameSiteValueInvalid2 = Неважечка вредност “SameSite“ за колачето „%1$S“. Поддржаните вредности се: “Lax“, “Strict“, “None“.
# LOCALIZATION NOTE(CookieInvalidMaxAgeAttribute): %1$S is cookie name. Do not localize "max-age".
CookieInvalidMaxAgeAttribute = Неважечка вредност “max-age“ за колачето “%1$S“. Атрибутот е игнориран.
# LOCALIZATION NOTE (CookieOversize): %1$S is the cookie name. %2$S is the number of bytes. "B" means bytes.
CookieOversize = Колачето “%1$S“ е неважечко бидејќи неговата големина е преголема. Максималната големина е %2$S B.
# LOCALIZATION NOTE (CookiePathOversize): %1$S is the cookie name. %2$S is the number of bytes. "B" means bytes.
CookiePathOversize = Колачето “%1$S“ е неважечко бидејќи големината на неговата патека е преголема. Максималната големина е %2$S B.
# LOCALIZATION NOTE (CookieRejectedByPermissionManager): %1$S is the cookie response header.
CookieRejectedByPermissionManager = Колачето “%1$S“ е одбиено од поради дозволите поставени од корисникот.
CookieRejectedEmptyNameAndValue = Колачето без име и без вредност е одбиено.
# LOCALIZATION NOTE (CookieRejectedInvalidCharName): %1$S is the cookie name.
CookieRejectedInvalidCharName = Колачето “%1$S“ е одбиено поради неважечки знаци во името.
# LOCALIZATION NOTE (CookieRejectedInvalidCharAttributes): %1$S is the cookie name.
CookieRejectedInvalidCharAttributes = Колачето “%1$S” е одбиено поради неважечки знаци во атрибутите.
# LOCALIZATION NOTE (CookieRejectedInvalidDomain): %1$S is the cookie name.
CookieRejectedInvalidDomain = Колачето “%1$S” е одбиено поради неважечки домен.
# LOCALIZATION NOTE (CookieRejectedInvalidPrefix): %1$S is the cookie name.
CookieRejectedInvalidPrefix = Колачето “%1$S” е одбиено поради неважечки префикс.
# LOCALIZATION NOTE (CookieRejectedInvalidPath): %1$S is the cookie name.
CookieRejectedInvalidPath = Колачето “%1$S” е одбиено поради неважечка патека.
# LOCALIZATION NOTE (CookieRejectedInvalidCharValue): %1$S is the cookie name.
CookieRejectedInvalidCharValue = Колачето “%1$S” е одбиено поради неважечки знаци во вредноста.
# LOCALIZATION NOTE (CookieRejectedAttributePathOversize): %1$S is the cookie name.
CookieRejectedAttributePathOversize = Колачето “%1$S“ е одбиено бидејќи неговиот атрибут за патека е преголем.
# LOCALIZATION NOTE (CookieRejectedAttributeDomainOversize): %1$S is the cookie name.
CookieRejectedAttributeDomainOversize = Колачето “%1$S“ е одбиено бидејќи неговиот атрибут на домен е преголем.
# LOCALIZATION NOTE (CookieRejectedAttributeExpiryOversize): %1$S is the cookie name.
CookieRejectedAttributeExpiryOversize = Колачето “%1$S“ е одбиено бидејќи неговиот датум на истекување е над границата.
# LOCALIZATION NOTE (CookieRejectedHttpOnlyButFromScript): %1$S is the cookie name.
CookieRejectedHttpOnlyButFromScript = Колачето “%1$S” е одбиено бидејќи веќе постои колаче само за HTTP, но скриптата се обиде да зачува ново.
# LOCALIZATION NOTE (CookieRejectedSecureButHttp): %1$S is the cookie name.
CookieRejectedSecureButNonHttps = Колачето “%1$S” е одбиено бидејќи колаче кое не е HTTPS не може да се постави како “безбедно”.
# LOCALIZATION NOTE (CookieRejectedThirdParty): %1$S is the cookie response header.
CookieRejectedThirdParty = Колачето “%1$S” е одбиено како од трета страна.
# LOCALIZATION NOTE (CookieRejectedNonsecureOverSecure): %1$S is the cookie name.
CookieRejectedNonsecureOverSecure = Колачето “%1$S“ е одбиено бидејќи веќе постои “безбедно” колаче.
# LOCALIZATION NOTE (CookieRejectedForNonSameSiteness): %1$S is the cookie name.
CookieRejectedForNonSameSiteness = Колачето “%1$S“ е одбиено бидејќи е во контекст помеѓу страници и неговото “SameSite“ е “Lax“ или “Strict“.
# LOCALIZATION NOTE (CookieRejectedPartitionedRequiresSecure): %1$S is the cookie name.
CookieRejectedPartitionedRequiresSecure = Колачето “%1$S“ е одбиено бидејќи го има атрибутот “Partitioned”, но му недостасува атрибутот “secure”.
# LOCALIZATION NOTE (CookieAttributeIgnored): %1$S is the cookie name. %2$S is the attribute name. %3$S is the number of bytes. "B" means bytes.
CookieAttributeIgnored = Вредноста на атрибутот “%2$S“ за колачето “%1$S“ е одбиена бидејќи неговата големина е преголема. Максималната големина е %3$S B.
CookieAttributeOverwritten = Вредноста на атрибутот “%2$S“ за колачето “%1$S“ е пребришана.
# LOCALIZATION NOTE (CookieForeignNoPartitionedWarning): %1$S is the cookie name. Do not translate "Partitioned"
CookieForeignNoPartitionedWarning = Колачето “%1$S“ наскоро ќе биде одбиено бидејќи е туѓо и нема атрибут “Partitioned“
# LOCALIZATION NOTE (CookieForeignNoPartitionedError): %1$S is the cookie name. Do not translate "Partitioned"
CookieForeignNoPartitionedError = Колачето "%1$S“ е одбиено бидејќи е туѓо и нема атрибут „Partitioned“.
# LOCALIZATION NOTE (CookieBlockedCrossSiteRedirect): %1$S is the cookie name. Do not translate "SameSite", "Lax" or "Strict".
CookieBlockedCrossSiteRedirect = Колачето “%1$S“ со вредност на атрибутот “SameSite“ “Lax“ или “Strict“ беше изоставено поради пренасочување меѓу локации.
# LOCALIZATION NOTE (APIDeprecationWarning): %1$S is the deprecated API; %2$S is the API function that should be used.
APIDeprecationWarning = Предупредување: ‘%1$S’ е застарено, користете ‘%2$S’
# LOCALIZATION NOTE (ResourceBlockedCORS): %1$S is the url of the resource blocked by ORB. $2$S is the reason.
# example: The resource at <url> was blocked by OpaqueResponseBlocking. Reason: “nosniff with either blocklisted or text/plain”.
ResourceBlockedORB = Ресурсот на “%1$S” беше блокиран од OpaqueResponseBlocking. Причина: “%2$S”.
InvalidHTTPResponseStatusLine = Линијата за статус на HTTP одговорот е неважечка
# LOCALIZATION NOTE (LocalNetworkAccessDetected): %1$S is top-level site, %2$S is initiator, %3$S is target URL, %4$S is target IP, %5$S is port, %6$S is mechanism (e.g., fetch, xhr, websocket), %7$S is secure context (true or false), %8$S is prompt action (values: "Allow", "Deny", or "(empty)" if no prompt shown)
LocalNetworkAccessDetected = Откриен е пристап до локална мрежа: страница од највисоко ниво “%1$S“, иницијатор “%2$S“, пристап до целта “%3$S“ (%4$S:%5$S) преку %6$S. Безбеден контекст: %7$S, брза акција: %8$S
# LOCALIZATION NOTE (LocalNetworkAccessPermissionRequired): %1$S is top-level site, %2$S is initiator, %3$S is target URL, %4$S is target IP, %5$S is port, %6$S is mechanism (e.g., fetch, xhr, websocket), %7$S is secure context (true or false)
LocalNetworkAccessPermissionRequired = Потребна е дозвола за пристап до локална мрежа: страница од највисоко ниво “%1$S“, иницијатор “%2$S“, обид за пристап до целта “%3$S“ (%4$S:%5$S) преку %6$S. Безбеден контекст: %7$S
