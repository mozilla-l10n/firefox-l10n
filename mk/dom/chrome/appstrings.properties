malformedURI2 = Проверете дали адресата е точна и обидете се повторно.
fileNotFound = Датотеката %S не може да се пронајде. Проверете ја локацијата и обидете се повторно.
fileAccessDenied = Датотеката %S не може да се прочита.
# %S is replaced by the uri host
httpErrorPage = %S врати грешка.
serverError = %S можеби има привремен проблем или можеби е преместено.
dnsNotFound2 = %S не може да се пронајде. Проверете го името и обидете се повторно.
basicHttpAuthDisabled = Некој што се преправа дека е ова место можеби се обидува да украде Ваши информации. Или можеби Вашите поставки за поврзување не се правилно поставени.
unknownProtocolFound = Едно од следниве (%S) не е регистриран протокол или не е дозволен во овој контекст.
connectionFailure = При обидот за контакт со %S, врската беше одбиена.
netInterrupt = Врската со %S неочекувано беше прекината. Некои податоци можеби се пренесени.
netTimeout = Времето за операцијата истече додека траеше обидот за контактирање со %S.
redirectLoop = Границата за редирекција за ова URL е надмината.  Бараната страница не може да се вчита.  Ова може да е предизвикано од блокирањето колачиња.
confirmRepostPrompt = За да ја прикаже оваа страница, програмата мора да испрати информации кои ќе ја повторат било која акција (како на пример пребарување или потврда за нарачка) која била изведена претходно.
resendButton.label = Испрати повторно
clientSocketMisconfiguration = Клиентот е погрежно конфигуриран и не знае како да комуницира со серверот.
unknownSocketType = Овој документ може да биде прикажан само ако инсталирате Менаџер за лична безбедност (PSM). Инсталирате го PSM и обидете се повторно, или контактирајте со системскиот администратор.
netReset = Документот не содржи податоци.
notCached = Овој документ веќе не е достапен.
netOffline = Овој документ не може да биде прикажан локално. За да одите на Интернет, исклучете ја опцијата Работи локално од менито Датотека.
isprinting = Документот не може да се измени за време на печатење или при преглед за печатење.
deniedPortAccess = Пристапот до наведениот порт е оневозможен од безбедносни причини.
proxyResolveFailure = Серверот посредник кој го конфигуриравте не може да се пронајде. Проверете ги поставките и обидете се повторно.
proxyConnectFailure = При обидот да се контактира со серверот посредник кој вие го конфигуриравте врската беше одбиена. Проверете ги поставките и обидете се повторно.
contentEncodingError = Страницата која сакате да ја видите не може да биде прикажана бидејќи користи неправилна или неподдржана форма на компресија.
unsafeContentType = Страницата која сакате да ја видите не може да биде прикажана бидејќи содржи тип на датотека кој не е безбедно да се отвори. Контактирајте со сопствениците на страницата за да ги информирате за овој проблем.
malwareBlocked = Местото %S е пријавено како напаѓачко место и е блокирано врз основа на вашите безбедносни поставки.
harmfulBlocked = Местото %S е пријавено како можно штетно мести и е блокирано согласно Вашите преференции за безбедност.
unwantedBlocked = Местото %S е пријавено како место што служи непосакуван софтвер и е блокирано согласно Вашите преференции за безбедност.
deceptiveBlocked = Оваа мрежна страница на %S е пријавен како измамничка и е блокирана согласно Вашите преференции за безбедност.
addonBlocked = Местото е блокирано за Ваша безбедност.
cspBlocked = Оваа страница има политика за безбедност на содржината што спречува нејзино вчитување на овој начин.
xfoBlocked = Оваа страница има политика X-Frame-Options што спречува нејзино вчитување во овој контекст.
corruptedContentErrorv2 = Местото на %S има прекршување на мрежниот протокол кое не може да се поправи.
sslv3Used = Безбедноста на Вашите податоци не може да се гарантира бидејќи %S користи SSLv3, неисправен безбедносен протокол.
weakCryptoUsed = Сопственикот на %S го конфигурирал своето место неправилно. За да се заштитат Вашите информации од кражба, врската до ова место не беше воспоставена.
inadequateSecurityError = Мрежното место се обиде да преговара со несоодветно ниво на безбедност.
blockedByPolicy = Вашата организација го блокирала пристапот до оваа страница или мрежно место.
blockedByCORP = Оваа страница не е вчитана бидејќи личи дека нејзината безбедносна конигурација не е иста таа на претходната страница.
invalidHeaderValue = %S врати заглавје со празни знаци што не е дозволено според стандардите за мрежна безбедност.
networkProtocolError = На Firefox му се случи прекршување на мрежниот протокол кое што не може да се поправи.
